name: Test
on:
  push:
    branches:
      - master
    paths:
      - "**/*.go"
      - "go.work"
      - "src/go.mod"
      - "src/go.sum"
      - ".github/workflows/test.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
    paths:
      - "**/*.go"
      - "go.work"
      - "src/go.mod"
      - "src/go.sum"
      - ".github/workflows/test.yml"
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: ^1.17.1

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Check Go modules
        run: |
          go -C src mod tidy -compat=1.17
          git diff --exit-code src/go.mod src/go.sum
          go -C src mod verify

      - name: Test
        run: make test
